<!doctype html>
<html>
  <head>
    <title>Workout Routine</title>
  </head>

  <body>
    <h1>Workout Routine</h1>
    <p>
      <a href="/">Front Page</a>
    </p>

    <form action="/create_workout" method="post">
      <p>
        Title: <br />
        <input type="text" name="title" maxlength="50" required />
      </p>

      <p>
        Description: <br />
        <textarea
          name="description"
          rows="8"
          cols="60"
          maxlength="1000"
          required
        ></textarea>
      </p>

      {% for class in classes %}
      <p>{{ class }}:</p>
        {% for option in classes[class] %}
          <input type="checkbox" name="class" value="{{ class }}:{{ option }}" /> {{ option }} <br />
        {% endfor %}
      </p>
      {% endfor %}

      <input type="submit" value="Create" />
    </form>
  </body>
</html>
