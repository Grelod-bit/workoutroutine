<!doctype html>
<html>
  <head>
    <title>Edit</title>
  </head>

  <body>
    <h1>Edit</h1>
    <p>
      <a href="/">Front Page</a>
    </p>

    <form action="/update_workout" method="post">
      <p>
        Title: <br />
        <input
          type="text"
          name="title"
          maxlength="50"
          required
          value="{{workout.title}}"
        />
      </p>
      <p>
        Muscle Group(s): <br />
        <input
          type="text"
          name="muscle_groups"
          maxlength="1000"
          required
          value="{{workout.muscle_groups}}"
        />
      </p>
      <p>
        Goal(s): <br />
        <input
          type="text"
          name="goals"
          maxlength="1000"
          required
          value="{{workout.goals}}"
        />
      </p>
      <p>
        Description: <br />
        <textarea
        name="description"
        rows="8"
        cols="60
        maxlength="1000" required>{{workout.description}}</textarea>
      </p>
      <input type="hidden" name="workout_id" value="{{ workout.id }}" />
      <input type="submit" value="Update" />
    </form>
  </body>
</html>
